[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "encode-pipeline"
version = "0.3.0"
description = "ENCODE-style ChIP-seq / CUT&Tag / ATAC-seq / MNase-seq Snakemake pipeline library"
requires-python = ">=3.10"
dependencies = [
    "pyyaml",
]

[project.optional-dependencies]
api = [
    "fastapi",
    "uvicorn[standard]",
]
dev = [
    "pytest",
    "pytest-cov",
    "ruff",
    "mypy",
    "snakefmt",
]

[project.scripts]
encode-validate = "encode_pipeline.cli.validate:main"
encode-manifest = "encode_pipeline.cli.manifest:main"
encode-dag = "encode_pipeline.cli.dag:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["test"]
python_files = ["test_*.py"]
addopts = "--strict-markers -v"

[tool.coverage.run]
source = ["src/encode_pipeline", "scripts"]
branch = true

[tool.coverage.report]
fail_under = 23
show_missing = true
skip_covered = false

[tool.snakefmt]
line_length = 120
include = '\.smk$|Snakefile'
exclude = '\.snakemake/|workflow/rules/(idr|consensus|report|qc)\.smk$'
