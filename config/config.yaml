# ChIP-seq / CUT&Tag Snakemake Pipeline Configuration
# ======================================================
# This pipeline defaults to no-input / no-control mode.
# Set use_control: true to optionally pass control_bam from the sample sheet.

# Path to sample sheet (TSV format)
samples: "config/samples.tsv"

# Output directory
outdir: "results"

# CPU threads per sample
threads: 8

# Mapping quality filter threshold
mapq: 30

# BigWig bin size (bp)
binsize: 10

# Duplicate removal policy: auto | yes | no
# auto → yes for narrow peaks, no for broad peaks
remove_dup: "auto"

# Adapter/quality trimming: true | false
trim: true

# Read extension for BigWig: auto | yes | no | <integer>
# auto → extend SE reads; PE reads inferred from pairs
extend_reads: "auto"

# Enable optional control/input BAM support
# When false, control_bam in the sample sheet is ignored
use_control: false

# Run MultiQC aggregation after all samples complete
multiqc: true

# ---------------------------------------------------------------------------
# Stage 4c: Tool parameterization (optional)
# ---------------------------------------------------------------------------
# Each block below exposes common stable parameters for a workflow tool.
# Missing tool_parameters or missing keys use current defaults silently.
# extra_args is an advanced verbatim string appended to the command.
# It must NOT override workflow-managed inputs, outputs, threads, or
# output directories. Prefer structured config keys for supported options.
#
# tool_parameters:
#   fastqc:
#     # extra_args: ""
#   trim_galore:
#     # quality: 20           # optional → --quality N
#     # length: 20            # optional → --length N
#     # stringency: 3         # optional → --stringency N
#     # extra_args: ""
#   bowtie2:
#     # mode: "sensitive"     # "very-fast"|"fast"|"sensitive"|"very-sensitive", optional
#     # dovetail: false       # boolean → --dovetail when true
#     # no_mixed: false       # boolean → --no-mixed when true
#     # no_discordant: false  # boolean → --no-discordant when true
#     # extra_args: ""
#   samtools_filter:
#     # filter_flags: 0x904   # always emitted; accepts "0x904", "2308", 2308
#     # extra_args: ""
#   picard_markduplicates:
#     # optical_duplicate_pixel_distance: 100  # optional → OPTICAL_DUPLICATE_PIXEL_DISTANCE=N
#     # extra_args: ""
#   bamcoverage:
#     # normalize_using: "CPM"  # CPM|RPKM|BPM|None — always emitted
#     # smooth_length: ""      # optional positive int → --smoothLength N
#     # extra_args: ""
#   macs3:
#     # qvalue: 0.01            # float >0 — always emitted as -q N
#     # broad_cutoff: 0.1       # float >0 — always emitted (broad mode)
#     # extra_args: ""          # appended after policy args, unquoted
#   multiqc:
#     # title: ""               # optional string → --title "quoted value"
#     # extra_args: ""

# Genome-specific resources for QC and ENCODE-like metrics (Stage 2+).
# Keys are genome labels used in the sample sheet's "genome" column.
#
# IMPORTANT: "hs" and "mm" are MACS3 effective genome size shortcuts,
# NOT genome assemblies. They correspond to:
#   hs → hg38 / GRCh38 (2913022398)
#   mm → mm10 / GRCm38 (2652783500)
#
# For mm39 / GRCm39, use the "mm39" entry (explicit numeric size).
# effective_genome_size: "hs", "mm", or a positive integer.
# Other fields (chrom_sizes, blacklist, gtf, reference_fasta) are
# optional paths — leave empty if not needed yet.
genome_resources:
  hs:
    effective_genome_size: "hs"
    chrom_sizes: ""
    blacklist: ""
    gtf: ""
    reference_fasta: ""

  mm:
    effective_genome_size: "mm"
    chrom_sizes: ""
    blacklist: ""
    gtf: ""
    reference_fasta: ""

  hg19:
    effective_genome_size: 2864785220
    chrom_sizes: ""
    blacklist: ""
    gtf: ""
    reference_fasta: ""

  hg38:
    effective_genome_size: 2913022398
    chrom_sizes: ""
    blacklist: ""
    gtf: ""
    reference_fasta: ""

  mm10:
    effective_genome_size: 2652783500
    chrom_sizes: ""
    blacklist: ""
    gtf: ""
    reference_fasta: ""

  mm39:
    effective_genome_size: 2654621783
    chrom_sizes: ""
    blacklist: ""
    gtf: ""
    reference_fasta: ""

# Stage 4b replicate-aware grouped outputs (Stage 4b).
# When true, biological-replicate BAMs, pooled BAMs, and pooled peaks
# are scheduled for experiments with >=2 biological replicates.
# Set to false to disable all Stage 4b outputs.
stage4b: true

# Stage 5: TF ChIP-seq IDR and reproducibility (default off)
stage5: false

# Stage 5 IDR analysis settings
# idr:
#   seed: 42
#   threshold: 0.05
#   rank: "p.value"

# Stage 3 QC configuration.
# Each switch accepts boolean or string boolean (true/false).
# Missing qc block defaults to all switches enabled.
qc:
  blacklist_filter: true
  frip: true
  library_complexity: true
  nrf_pbc: true
  signal_tracks: true
  summary: true
  cuttag_fragment_size: true

# CUT&Tag-specific configuration (Stage 7b)
# cuttag:
#   peak_caller: "macs3"
#   seacr:
#     enabled: false
#     mode: "stringent"
#     normalization: "non"
#     threshold: 0.01
