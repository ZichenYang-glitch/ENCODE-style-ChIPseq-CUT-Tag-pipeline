artifacts:
- id: final_bam
  description: Final filtered/dedup BAM for downstream use
  scope: sample
  level: per_sample
  assay_gate: all
  path_template: results/<sample>/02_align/<sample>.final.bam
  producing_rule: (common.smk)
  tool: bowtie2+samtools
  manifest_output_type: final_bam
  pipeline_done: false
  rule_all: false
  config_gate: null
  notes: pipeline_done depends on final_bam.bai, not final_bam directly
- id: final_bai
  description: BAM index for final.bam
  scope: sample
  level: per_sample
  assay_gate: all
  path_template: results/<sample>/02_align/<sample>.final.bam.bai
  producing_rule: (common.smk)
  tool: samtools index
  manifest_output_type: final_bai
  pipeline_done: false
  rule_all: false
  config_gate: null
  notes: indirect dependency via sorted.bam.bai / bamCoverage; not a named pipeline_done input
- id: cpm_bigwig
  description: CPM-normalized coverage BigWig
  scope: sample
  level: per_sample
  assay_gate: all
  path_template: results/<sample>/03_bigwig/<sample>.CPM.bw
  producing_rule: (common.smk)
  tool: bamCoverage CPM
  manifest_output_type: cpm_bigwig
  pipeline_done: true
  rule_all: true
  config_gate: null
  notes: produced for treatment and control samples
- id: pipeline_done
  description: Sentinel file marking sample-level pipeline completion
  scope: sample
  level: per_sample
  assay_gate: all
  path_template: results/<sample>/logs/<sample>.pipeline.done
  producing_rule: (common.smk)
  tool: touch
  manifest_output_type: null
  pipeline_done: false
  rule_all: true
  config_gate: null
  notes: treatment samples only
- id: macs3_peak
  description: MACS3 peak calling directory
  scope: sample
  level: per_sample
  assay_gate: peak_centric
  path_template: results/<sample>/04_peaks/<sample>/
  producing_rule: macs3_callpeak
  tool: macs3 callpeak
  manifest_output_type: macs3_peak
  pipeline_done: true
  rule_all: true
  config_gate: null
  notes: directory output; not produced for MNase
- id: macs3_fe_bdg
  description: MACS3 fold-enrichment bedGraph
  scope: sample
  level: per_sample
  assay_gate: peak_centric
  path_template: results/<sample>/03_signal/<sample>.FE.bdg
  producing_rule: signal_track_fe
  tool: macs3 bdgcmp FE
  manifest_output_type: macs3_fe_bdg
  pipeline_done: true
  rule_all: true
  config_gate: 'qc.signal_tracks: true'
  notes: gated on QC_CONFIG signal_tracks
- id: macs3_ppois_bdg
  description: MACS3 Poisson p-value bedGraph
  scope: sample
  level: per_sample
  assay_gate: peak_centric
  path_template: results/<sample>/03_signal/<sample>.ppois.bdg
  producing_rule: signal_track_ppois
  tool: macs3 bdgcmp ppois
  manifest_output_type: macs3_ppois_bdg
  pipeline_done: true
  rule_all: true
  config_gate: 'qc.signal_tracks: true'
  notes: gated on QC_CONFIG signal_tracks
- id: macs3_fe_bw
  description: MACS3 fold-enrichment BigWig
  scope: sample
  level: per_sample
  assay_gate: peak_centric
  path_template: results/<sample>/03_signal/<sample>.FE.bw
  producing_rule: signal_track_fe_bw
  tool: bedGraphToBigWig
  manifest_output_type: macs3_fe_bw
  pipeline_done: false
  rule_all: true
  config_gate: 'qc.signal_tracks: true + chrom_sizes configured'
  notes: Stage 22
- id: macs3_ppois_bw
