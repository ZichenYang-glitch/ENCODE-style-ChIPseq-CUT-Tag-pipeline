# config.schema.yaml — Workflow configuration contract
# ======================================================
# Documents every config key, its type, allowed values, and defaults.
# This file is a human-readable contract. Runtime validation is performed
# by scripts/validate_samples.py (stdlib only, no YAML-schema dependency).

# ---- Required ----
samples:
  type: string
  description: Path to sample sheet (TSV format).
  required: true

# ---- Output & Resources ----
outdir:
  type: string
  default: "results"
  description: Output directory for all pipeline results.

threads:
  type: integer
  default: 8
  constraints: ">= 1"
  description: CPU threads per job.

mapq:
  type: integer
  default: 30
  constraints: ">= 0"
  description: MAPQ filter threshold for samtools view -q.

binsize:
  type: integer
  default: 10
  constraints: ">= 1"
  description: BigWig bin size in bp.

# ---- Processing Policies ----
remove_dup:
  type: string
  default: "auto"
  allowed: ["auto", "yes", "no"]
  description:
    Duplicate removal policy.
    auto → yes for narrow-peak samples, no for broad peaks.

trim:
  type: boolean | string
  default: true
  allowed: [true, false, "true", "false"]
  description: Enable adapter/quality trimming with Trim Galore.

extend_reads:
  type: string
  default: "auto"
  allowed: ["auto", "yes", "no", "<positive integer>"]
  description:
    Read extension policy for bamCoverage.
    auto → extend SE reads; PE reads inferred from pairs.
    yes  → extend SE reads; PE reads from pair inference.
    no   → no extension.
    <N>  → extend reads to N bp.

use_control:
  type: boolean | string
  default: false
  allowed: [true, false, "true", "false"]
  description:
    Enable optional control/input support.
    When false, control_bam and control_sample are silently ignored.

multiqc:
  type: boolean | string
  default: true
  allowed: [true, false, "true", "false"]
  description: Run MultiQC aggregation after all samples complete.

# ---- Genome Resources (Stage 2) ----
genome_resources:
  type: mapping
  required: false
  description: >
    Genome-specific resource paths and effective genome sizes.
    Keys are genome labels (e.g. hs, mm, hg19, hg38, mm10, mm39).
    "hs" and "mm" are MACS3 effective genome size shortcuts —
    they are not genome assemblies.

    hs   → effective_genome_size: "hs" (MACS3 shortcut, 2913022398 for GRCh38/hg38)
    mm   → effective_genome_size: "mm" (MACS3 shortcut, 2652783500 for GRCm38/mm10)
    hg19 → effective_genome_size: 2864785220
    hg38 → effective_genome_size: 2913022398
    mm10 → effective_genome_size: 2652783500
    mm39 → effective_genome_size: 2654621783

    chrom_sizes, blacklist, gtf, and reference_fasta are optional paths.
    If non-empty, they must exist on disk.
  schema:
    "<genome>":
      type: mapping
      required: [effective_genome_size]
      optional: [chrom_sizes, blacklist, gtf, reference_fasta]
      properties:
        effective_genome_size:
          type: string | integer
          allowed: ["hs", "mm", "<positive integer>"]
          description: MACS3 -g value or explicit effective genome size.
        chrom_sizes:
          type: string
          default: ""
          description: Path to chromosome sizes file (e.g. hg38.chrom.sizes).
        blacklist:
          type: string
          default: ""
          description: Path to ENCODE blacklist BED file.
        gtf:
          type: string
          default: ""
          description: >
            Path to reference GTF annotation. Required when
            qc.tss_enrichment is true.
        reference_fasta:
          type: string
          default: ""
          description: Path to reference FASTA file.

# ---- Stage 3 QC (optional) ----
qc:
  type: mapping
  required: false
  default:
    blacklist_filter: true
    frip: true
    library_complexity: true
    nrf_pbc: true
    signal_tracks: true
    summary: true
    cuttag_fragment_size: true
    cross_correlation: false
    preseq_complexity: false
    picard_metrics: false
    tss_enrichment: false
  description: >
    Single-sample QC switches. Missing qc block defaults legacy Stage 3
    switches to true and heavier optional modules to false. Each switch
    accepts boolean or string boolean.
  schema:
    blacklist_filter:
      type: boolean
      default: true
      description: >
        Enable blacklist filtering for BAM and peak files. When true,
        blacklist-filtered outputs are only scheduled for genomes that
        have a non-empty blacklist path in genome_resources.
    frip:
      type: boolean
      default: true
      description: >
        Enable FRiP (Fraction of Reads in Peaks) calculation.
        Stage 3a is read-record based, not fragment-based.
    library_complexity:
      type: boolean
      default: true
      description: >
        Enable library complexity metrics from Picard MarkDuplicates.
        Stage 3b-1 is duplication-derived (not preseq-based).
        If Picard is unavailable, NA values are emitted.
    nrf_pbc:
      type: boolean
      default: true
      description: >
        Enable NRF/PBC library complexity metrics from BAM.
        Stage 3c-1 is BAM-derived (not preseq-based, not cross-correlation).
        NRF = distinct_fragments / total_fragments.
        PBC1 = one_read_fragments / distinct_fragments.
        PBC2 = one_read_fragments / two_read_fragments.
    signal_tracks:
      type: boolean
      default: true
      description: >
        Enable MACS3 fold-enrichment and p-value bedGraph signal tracks.
        Produces FE and ppois bedGraph files from MACS3 treat_pileup
        and control_lambda outputs.
    summary:
      type: boolean
      default: true
      description: >
        Enable per-sample QC summary TSV and project-level summary.
        Enables peak count reporting. When summary is true, frip and
        peak_counts are also enabled regardless of their switches.
    cuttag_fragment_size:
      type: boolean
      default: true
      description: >
        Enable CUT&Tag fragment-size QC for active samples with assay=cuttag.
    cross_correlation:
      type: boolean
      default: false
      description: >
        Enable phantompeakqualtools cross-correlation QC (NSC/RSC/fragment length).
        Produces .cc.qc and .cc.plot.pdf per sample.
    preseq_complexity:
      type: boolean
      default: false
      description: >
        Enable preseq library complexity extrapolation.
        Produces .preseq.txt per sample. Complements existing NRF/PBC metrics.
    picard_metrics:
      type: boolean
      default: false
      description: >
        Enable Picard CollectMultipleMetrics (alignment summary, insert size,
        quality distribution). Requires genome_resources.reference_fasta.
    tss_enrichment:
      type: boolean
      default: false
      description: >
        Enable deepTools TSS enrichment-style profiles around transcription
        start sites. Requires genome_resources.gtf for every treatment sample
        genome. Produces a TSS BED, computeMatrix output, profile TSV, and PDF.

# ---- Stage 4b Replicate-Aware Outputs (optional) ----
stage4b:
  type: boolean | string
  default: true
  allowed: [true, false, "true", "false"]
  description: >
    Enable Stage 4b replicate-aware grouped outputs.
    When true:
    - Biorep BAMs are produced for technical-replicate merging or
      as intermediates for pooled outputs.
    - Pooled treatment/control BAMs and pooled MACS3 peaks are only
      scheduled for experiments with >=2 treatment biological replicates.
    - Single-sample workflows produce zero Stage 4b outputs.
    Set to false to disable all Stage 4b outputs and revert to
    the Stage 4a metadata-only behavior.

# ---- Stage 5: TF ChIP-seq IDR (optional) ----
stage5:
  type: boolean | string
  default: false
  allowed: [true, false, "true", "false"]
  description: >
    Enable Stage 5 TF ChIP-seq true-replicate IDR. When true, requires
    stage4b: true. Supports chipseq + narrow + exactly 2 biological
    replicates only. Produces IDR-ready MACS3 peak calls and true
    replicate IDR output. Set to false to disable all Stage 5 outputs.

idr:
  type: mapping
  required: false
  description: >
    Stage 5 IDR analysis settings. Only validated when stage5 is true.
  schema:
    seed:
      type: integer
      default: 42
      description: Deterministic pseudoreplicate split seed (positive integer).
    threshold:
      type: float
      default: 0.05
      description: IDR threshold for thresholded narrowPeak output (float in (0, 1)).
    rank:
      type: string
      default: "p.value"
      allowed: ["p.value", "signal.value"]
      description: Column to rank by in IDR.

# ---- Stage 7b: CUT&Tag Peak Caller (optional) ----
cuttag:
  type: mapping
  required: false
  description: >
    CUT&Tag-specific configuration. When absent, MACS3 is used as the
    canonical peak caller with no sidecar outputs.
  schema:
    peak_caller:
      type: string
      default: "macs3"
      allowed: ["macs3"]
      description: Canonical peak caller (future: seacr, gopeaks).
    seacr:
      type: mapping
      required: false
      description: Optional SEACR sidecar peak calling.
      schema:
        enabled:
          type: boolean
          default: false
          description: Enable SEACR sidecar outputs for CUT&Tag PE samples.
        mode:
          type: string
          default: "stringent"
          allowed: ["stringent", "relaxed"]
          description: SEACR threshold mode.
        normalization:
          type: string
          default: "non"
          allowed: ["non"]
          description: SEACR normalization (non only in Stage 7b).
        threshold:
          type: float
          default: 0.01
          description: Numeric FDR threshold for treatment-only mode (float in (0, 1)).

# ---- MNase-seq Nucleosome-Centric Configuration (optional, Stage 39-40) ----
mnase:
  type: mapping
  required: false
  default:
    mono_range: [140, 200]
    fragments:
      sub: [1, 139]
      mono: [140, 200]
      di: [300, 400]
    dyad_range: [130, 200]
    callers:
      danpos3: false
      inps: false
      sem: false
  description: >
    MNase-seq nucleosome-centric pipeline configuration. When absent,
    defaults are used. Only relevant for samples with assay=mnase.
  schema:
    mono_range:
      type: list
      default: [140, 200]
      description: >
        (Deprecated, prefer fragments.mono.) Fragment length range for
        mono-nucleosome BAM generation via alignmentSieve. Must be a list
        of exactly two positive integers with min < max.
    fragments:
      type: mapping
      required: false
      description: >
        Fragment length ranges for sub-nucleosome, mono-nucleosome, and
        di-nucleosome BAM stratification. Each value must be a list of
        exactly two positive integers with min < max. When fragments.mono
        is present, it takes precedence over mono_range. When absent, all
        classes use their defaults.
      schema:
        sub:
          type: list
          default: [1, 139]
          description: Sub-nucleosome fragment range (min, max).
        mono:
          type: list
          default: [140, 200]
          description: >
            Mono-nucleosome fragment range. Takes precedence over the
            top-level mono_range key.
        di:
          type: list
          default: [300, 400]
          description: Di-nucleosome fragment range (min, max).
    dyad_range:
      type: list
      default: [130, 200]
      description: >
        Fragment length range for dyad BigWig generation via
        bamCoverage --MNase. Must be a list of exactly two positive
        integers with min < max. Allowed to differ from fragments.mono
        (e.g. dyad signal may use a wider window than mono occupancy).
    callers:
      type: mapping
      required: false
      description: >
        Nucleosome caller configuration surface. All callers default to
        false. Execution is deferred to a future release; setting any
        caller to true raises a validation error.
      schema:
        danpos3:
          type: boolean
          default: false
          description: DANPOS3 nucleosome calling (execution deferred).
        inps:
          type: boolean
          default: false
          description: iNPS nucleosome detection (execution deferred).
        sem:
          type: boolean
          default: false
          description: SEM nucleosome subtype analysis (execution deferred).

# ---- Stage 4c: Tool Parameterization (optional) ----
tool_parameters:
  type: mapping
  required: false
  default: {}
  description: >
    Optional structured config blocks for major workflow tools.
    Missing tool_parameters or missing tool blocks use current
    defaults silently. Each tool block supports typed keys for
    common stable parameters plus an extra_args string for advanced
    users. extra_args is verbatim and must not override
    workflow-managed inputs, outputs, threads, or output directories.
    Prefer structured config keys for supported options.
  schema:
    fastqc:
      type: mapping
      required: false
      properties:
        extra_args:
          type: string
          default: ""
          description: Additional fastqc CLI flags (verbatim).
    trim_galore:
      type: mapping
      required: false
      properties:
        quality:
          type: integer
          default: ""
          description: --quality Phred score cutoff (only emitted when set).
        length:
          type: integer
          default: ""
          description: --length minimum read length (only emitted when set).
        stringency:
          type: integer
          default: ""
          description: --stringency overlap stringency (only emitted when set).
        extra_args:
          type: string
          default: ""
          description: Additional trim_galore CLI flags (verbatim).
    bowtie2:
      type: mapping
      required: false
      properties:
        mode:
          type: string
          default: ""
          allowed: ["", "very-fast", "fast", "sensitive", "very-sensitive"]
          description: Alignment preset (only emitted when set).
        dovetail:
          type: boolean
          default: false
          description: --dovetail flag (emitted when true).
        no_mixed:
          type: boolean
          default: false
          description: --no-mixed flag (emitted when true).
        no_discordant:
          type: boolean
          default: false
          description: --no-discordant flag (emitted when true).
        extra_args:
          type: string
          default: ""
          description: Additional bowtie2 CLI flags (verbatim).
    samtools_filter:
      type: mapping
      required: false
      properties:
        filter_flags:
          type: integer | string
          default: "0x904"
          description: >
            -F filter flags. Accepts int, decimal string, or hex
            string like "0x904". Always emitted.
        extra_args:
          type: string
          default: ""
          description: Additional samtools view CLI flags (verbatim).
    picard_markduplicates:
      type: mapping
      required: false
      properties:
        optical_duplicate_pixel_distance:
          type: integer
          default: ""
          description: >
            OPTICAL_DUPLICATE_PIXEL_DISTANCE (only emitted when set).
        extra_args:
          type: string
          default: ""
          description: Additional picard MarkDuplicates options (verbatim).
    bamcoverage:
      type: mapping
      required: false
      properties:
        normalize_using:
          type: string
          default: "CPM"
          allowed: ["CPM", "RPKM", "BPM", "None"]
          description: >
            --normalizeUsing method. RPGC is not supported in this slice.
            Always emitted.
        smooth_length:
          type: integer
          default: ""
          description: --smoothLength (only emitted when set).
        extra_args:
          type: string
          default: ""
          description: Additional bamCoverage CLI flags (verbatim).
    macs3:
      type: mapping
      required: false
      properties:
        qvalue:
          type: float
          default: 0.01
          description: -q q-value (FDR) cutoff. Must be >0. Always emitted.
        broad_cutoff:
          type: float
          default: 0.1
          description: --broad-cutoff (broad peaks only). Must be >0.
        extra_args:
          type: string
          default: ""
          description: >
            Additional MACS3 callpeak flags (verbatim, appended after
            policy args).
    multiqc:
      type: mapping
      required: false
      properties:
        title:
          type: string
          default: ""
          description: --title report title (only emitted when set, safe-quoted).
        extra_args:
          type: string
          default: ""
          description: Additional multiqc CLI flags (verbatim).
