# Normalize sample names across tools (e.g. sample.final.bam → sample).
# MultiQC already strips common extensions (.bam, .fastq.gz, .txt).
# These extra extensions remove pipeline-specific suffixes so that
# per-sample BAM, flagstat, FastQC, and BigWig artifacts are grouped
# under the same sample label in the report.
extra_fn_clean_exts:
  - ".final"
  - ".sorted"
  - ".blacklist_filtered"

custom_data:
  cross_correlation_qc:
    section_name: "Cross-correlation QC"
    description: "Project-level phantompeakqualtools summary with ENCODE-style NSC/RSC quality flags."
    plot_type: "table"
    pconfig:
      id: "cross_correlation_qc"
      title: "Cross-correlation QC"
      col1_header: "Sample"
    headers:
      cc_qc_file:
        title: "Source .cc.qc"
        description: "Original phantompeakqualtools output parsed into the summary."
        hidden: true
      estimated_fragment_length:
        title: "Estimated fragment length"
        description: "Fragment-length estimate from the cross-correlation peak."
      phantom_peak:
        title: "Phantom peak"
        description: "Read-length artifact peak estimated by phantompeakqualtools."
      nsc:
        title: "NSC"
        description: "Normalized Strand Coefficient. ENCODE-style acceptable threshold is >= 1.05."
      rsc:
        title: "RSC"
        description: "Relative Strand Correlation. ENCODE-style acceptable threshold is >= 0.8."
      quality_flag:
        title: "Quality flag"
        description: "Project-assigned flag from NSC/RSC thresholds."

  mnase_qc:
    section_name: "MNase-seq QC"
    description: "Per-sample MNase-seq fragment stratification and QC summary (Stage 40)."
    plot_type: "table"
    pconfig:
      id: "mnase_qc"
      title: "MNase-seq QC Summary"
      col1_header: "Sample"
    headers:
      sub_reads:
        title: "Sub reads"
        description: "Read count in sub-nucleosome BAM (< mono range)."
      mono_reads:
        title: "Mono reads"
        description: "Read count in mono-nucleosome BAM."
      di_reads:
        title: "Di reads"
        description: "Read count in di-nucleosome BAM (> mono range)."
      mono_min:
        title: "Mono min (bp)"
        hidden: true
      mono_max:
        title: "Mono max (bp)"
        hidden: true
      dyad_min:
        title: "Dyad min (bp)"
        hidden: true
      dyad_max:
        title: "Dyad max (bp)"
        hidden: true
      caller_danpos3_enabled:
        title: "DANPOS3"
        description: "DANPOS3 caller enabled (execution deferred)."
      caller_inps_enabled:
        title: "iNPS"
        description: "iNPS caller enabled (execution deferred)."
      caller_sem_enabled:
        title: "SEM"
        description: "SEM caller enabled (execution deferred)."

sp:
  cross_correlation_qc:
    fn: "cross_correlation_summary.tsv"
  mnase_qc:
    fn: "*mnase_qc_summary.tsv"
