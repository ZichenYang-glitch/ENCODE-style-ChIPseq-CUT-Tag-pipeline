name: chipseq
channels:
  - conda-forge
  - bioconda
  - nodefaults
dependencies:
  # --- core runtime ---
  - python >=3.10,<3.13
  - openjdk >=17,<18

  # --- core pipeline tools ---
  - fastqc >=0.12,<1
  - trim-galore >=0.6,<1
  - cutadapt >=4.0,<5
  - bowtie2 >=2.5,<3
  - samtools >=1.16,<2
  - macs3 >=3.0,<4
  - deeptools >=3.5,<4
  - bedtools >=2.31,<3

  # --- workflow orchestration ---
  - snakemake >=8.0,<9
