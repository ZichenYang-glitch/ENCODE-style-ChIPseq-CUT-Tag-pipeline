name: chipseq
channels:
  - conda-forge
  - bioconda
  - nodefaults
dependencies:
  # --- core runtime ---
  - python >=3.10,<3.13
  - openjdk >=17,<18

  # --- core pipeline tools ---
  - fastqc
  - trim-galore
  - cutadapt
  - bowtie2
  - samtools
  - macs3
  - deeptools
  - bedtools

  # --- workflow orchestration ---
  - snakemake >=8.0,<9
