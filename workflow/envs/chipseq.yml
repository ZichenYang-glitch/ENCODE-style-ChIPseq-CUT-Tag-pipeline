name: chipseq
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # --- core pipeline tools (from original chipseq.yml) ---
  - fastqc
  - trim-galore
  - bowtie2
  - samtools
  - picard
  - macs3
  - deeptools
  - bedtools
  # --- workflow orchestration ---
  - snakemake >=8.0
  - multiqc
  # --- Stage 5 IDR ---
  - idr
  # --- Stage 7 CUT&Tag ---
  - seacr
