name: CI

"on":
  pull_request:
  push:
    branches: [main, "stage*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-checks:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7.4.9-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5

      - name: Setup micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: workflow/envs/ci-fast.lock
          environment-name: ci-fast
          cache-environment: true
          cache-environment-key: ci-fast-${{ runner.os }}-${{ hashFiles('workflow/envs/ci-fast.lock') }}

      - name: Install encode-pipeline package
        shell: micromamba-shell {0}
        run: pip install -e ".[api,dev]"

      - name: OpenAPI contract drift gate
        shell: micromamba-shell {0}
        run: python3 -m pytest test/api/test_openapi_export.py -v

      - name: Durable execution boundary tests
        shell: micromamba-shell {0}
        env:
          ENCODE_PIPELINE_TEST_REDIS_URL: redis://127.0.0.1:6379/15
        run: >-
          python3 -m pytest
          test/platform/test_execution.py
          test/platform/test_runs.py
          test/services/test_run_repositories.py
          test/services/test_run_cancellation.py
          test/services/test_run_service.py
          test/services/test_run_submission.py
          test/services/test_command_builder.py
          test/services/test_local_execution.py
          test/services/test_local_run_driver.py
          test/services/test_process_runner.py
          test/services/test_artifact_downloads.py
          test/persistence
          test/api/test_routes_artifact_downloads.py
          test/api/test_persistent_composition.py
          test/api/test_routes_cancel.py
          test/api/test_routes_start.py
          test/api/test_startup.py
          test/workers
          -v

      - name: Validate default config
        shell: micromamba-shell {0}
        run: python3 scripts/validate_samples.py --config config/config.yaml

      - name: Validate default config via package CLI
        shell: micromamba-shell {0}
        run: encode-validate --config config/config.yaml

      - name: Validation stress tests
        shell: micromamba-shell {0}
        run: python3 -m pytest test/config/test_validation.py -v

      - name: Stage 8a dry-run smoke profiles
        shell: micromamba-shell {0}
        run: python3 -m pytest test/test_stage8_smoke_profiles.py -v

      - name: No-hardcoded-paths guard
        shell: micromamba-shell {0}
        run: python3 test/test_no_hardcoded_paths.py

      - name: Stage 22 BigWig stress tests
        shell: micromamba-shell {0}
        run: python3 test/test_stage22_bigwig_stress.py

      - name: Stage 24 QC summary unit tests
        shell: micromamba-shell {0}
        run: python3 test/test_stage24_qc_summary_unit.py

      - name: Stage 25 manifest stress tests
        shell: micromamba-shell {0}
        run: python3 -m pytest test/manifest/test_make_manifest.py -v

      - name: Coverage gate
        shell: micromamba-shell {0}
        run: |
          python3 -m pytest \
            test/config/test_validation.py \
            test/manifest/test_make_manifest.py \
            test/test_stage8_smoke_profiles.py \
            test/api/test_routes_workflows.py \
            --cov=src/encode_pipeline --cov=scripts --cov-report=term

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify generated client is up to date
        run: |
          npm run openapi:generate
          git diff --exit-code -- openapi.json src/api/generated/
          test -z "$(git ls-files --others --exclude-standard -- src/api/generated/)"

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test -- --run

  browser-e2e:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7.4.9-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5

      - name: Setup micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: workflow/envs/ci-fast.lock
          environment-name: ci-fast
          cache-environment: true
          cache-environment-key: browser-e2e-${{ runner.os }}-${{ hashFiles('workflow/envs/ci-fast.lock') }}

      - name: Install platform package
        shell: micromamba-shell {0}
        run: pip install -e ".[api,dev]"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Real browser durable execution gate
        shell: micromamba-shell {0}
        working-directory: frontend
        env:
          ENCODE_PIPELINE_E2E_REDIS_URL: redis://127.0.0.1:6379/14
        run: npm run test:e2e

      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          if-no-files-found: ignore
          retention-days: 7

  real-execution:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v5

      - name: Setup micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: workflow/envs/chipseq.lock
          environment-name: chipseq
          cache-environment: true
          cache-environment-key: chipseq-${{ runner.os }}-${{ hashFiles('workflow/envs/chipseq.lock') }}

      - name: Stage 8b tiny real execution
        shell: micromamba-shell {0}
        run: python3 test/test_stage8b_tiny_execution.py
