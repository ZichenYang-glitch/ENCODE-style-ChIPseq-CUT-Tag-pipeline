name: CI

"on":
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bulk_rnaseq_real_execution:
        description: Run the pre-staged nf-core/rnaseq 3.26.0 acceptance gate
        required: false
        default: false
        type: boolean
      bulk_rnaseq_expected_sha:
        description: Exact reviewed 40-character commit required by the protected gate
        required: false
        default: ""
        type: string
  schedule:
    - cron: "17 19 * * *"
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Record job start
        run: echo "JOB_STARTED=$(date +%s)" >> "$GITHUB_ENV"

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Confirm exact checkout and tier
        env:
          EXPECTED_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          actual_sha=$(git rev-parse HEAD)
          test "$actual_sha" = "$EXPECTED_SHA"
          if [ "$EVENT_NAME" = "pull_request" ]; then
            tier="pr-fast"
          else
            tier="full-main"
          fi
          pr_head_sha=${PR_HEAD_SHA:-n/a}
          pr_base_sha=${PR_BASE_SHA:-n/a}
          echo "event=$EVENT_NAME tier=$tier tested-sha=$actual_sha pr-head-sha=$pr_head_sha pr-base-sha=$pr_base_sha"
          echo "### CI identity" >> "$GITHUB_STEP_SUMMARY"
          echo "- Event: \`$EVENT_NAME\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tier: \`$tier\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tested SHA: \`$actual_sha\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- PR head SHA: \`$pr_head_sha\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- PR base SHA: \`$pr_base_sha\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Setup micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: workflow/envs/ci-fast.lock
          environment-name: ci-fast
          cache-environment: true
          cache-environment-key: ci-fast-${{ runner.os }}-${{ hashFiles('workflow/envs/ci-fast.lock') }}

      - name: Install HelixWeave test dependencies
        shell: micromamba-shell {0}
        run: |
          python3 -m pip install --no-index --no-deps --no-build-isolation -e ".[api]"
          python3 -m pip check

      - name: Run deterministic Python tier once
        shell: micromamba-shell {0}
        env:
          EVENT_NAME: ${{ github.event_name }}
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            marker='not full_main and not platform_real_execution and not real_execution and not bulk_rnaseq_real_execution'
          else
            marker='not platform_real_execution and not real_execution and not bulk_rnaseq_real_execution'
          fi
          python3 -m pytest test -ra -p no:cacheprovider \
            -m "$marker" \
            --durations=25 --durations-min=1.0 \
            --junitxml=pytest-report.xml \
            --cov --cov-config=pyproject.toml --cov-context=test \
            --cov-fail-under=0 \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=json:coverage.json

      - name: Require passing, zero-skip Python outcomes
        if: always()
        shell: micromamba-shell {0}
        run: >-
          python3 scripts/check_junit_outcomes.py pytest-report.xml
          --label "deterministic ${{ github.event_name }} tier"

      - name: Validate default config
        shell: micromamba-shell {0}
        run: python3 scripts/validate_samples.py --config config/config.yaml

      - name: Validate default config via package CLI
        shell: micromamba-shell {0}
        run: encode-validate --config config/config.yaml

      - name: Upload Python test and coverage evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-${{ github.run_id }}
          path: |
            .coverage
            coverage.xml
            coverage.json
            pytest-report.xml
          include-hidden-files: true
          if-no-files-found: error
          overwrite: true
          retention-days: 14

      - name: Report fast-checks wall time
        if: always()
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          elapsed=$(( $(date +%s) - JOB_STARTED ))
          if [ "$EVENT_NAME" = "pull_request" ]; then budget=300; else budget=1200; fi
          echo "### fast-checks timing" >> "$GITHUB_STEP_SUMMARY"
          echo "- Wall time: ${elapsed}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- Soft budget: ${budget}s (informational)" >> "$GITHUB_STEP_SUMMARY"

  coverage:
    needs: fast-checks
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Record job start
        run: echo "JOB_STARTED=$(date +%s)" >> "$GITHUB_ENV"

      - name: Require successful coverage producer
        env:
          PRODUCER_RESULT: ${{ needs.fast-checks.result }}
        run: |
          echo "fast-checks result: $PRODUCER_RESULT"
          test "$PRODUCER_RESULT" = "success"

      - uses: actions/checkout@v5
        if: needs.fast-checks.result == 'success'
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Confirm exact checkout and coverage tier
        if: needs.fast-checks.result == 'success'
        env:
          EXPECTED_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          actual_sha=$(git rev-parse HEAD)
          test "$actual_sha" = "$EXPECTED_SHA"
          pr_head_sha=${PR_HEAD_SHA:-n/a}
          pr_base_sha=${PR_BASE_SHA:-n/a}
          echo "event=$EVENT_NAME tier=coverage tested-sha=$actual_sha pr-head-sha=$pr_head_sha pr-base-sha=$pr_base_sha"
          echo "### CI identity" >> "$GITHUB_STEP_SUMMARY"
          echo "- Event: \`$EVENT_NAME\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tier: \`coverage\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tested SHA: \`$actual_sha\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- PR head SHA: \`$pr_head_sha\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- PR base SHA: \`$pr_base_sha\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Download Python coverage evidence
        if: needs.fast-checks.result == 'success'
        uses: actions/download-artifact@v5
        with:
          name: python-coverage-${{ github.run_id }}
          path: .

      - name: Setup micromamba
        if: needs.fast-checks.result == 'success'
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: workflow/envs/ci-fast.lock
          environment-name: ci-fast
          cache-environment: true
          cache-environment-key: coverage-${{ runner.os }}-${{ hashFiles('workflow/envs/ci-fast.lock') }}

      - name: Enforce changed-line coverage
        if: needs.fast-checks.result == 'success' && github.event_name == 'pull_request'
        shell: micromamba-shell {0}
        run: >-
          diff-cover coverage.xml
          --compare-branch='${{ github.event.pull_request.base.sha }}'
          --fail-under=80

      - name: Enforce complete-suite coverage ratchets
        if: needs.fast-checks.result == 'success' && github.event_name != 'pull_request'
        shell: micromamba-shell {0}
        run: |
          python3 -m coverage report --fail-under=83
          python3 -m coverage report \
            --include='src/encode_pipeline/platform/*' --fail-under=88.45
          python3 -m coverage report \
            --include='src/encode_pipeline/services/*' --fail-under=87.28
          python3 -m coverage report \
            --include='src/encode_pipeline/persistence/*' --fail-under=89.06
          python3 -m coverage report \
            --include='src/encode_pipeline/workers/*' --fail-under=82.37
          python3 -m coverage report \
            --include='src/encode_pipeline/adapters/*' --fail-under=0
          python3 -m coverage report \
            --include='src/encode_pipeline/api/*,src/encode_pipeline/cli/*,src/encode_pipeline/config/*,src/encode_pipeline/samples/*' \
            --fail-under=0
          python3 -m coverage report --include='scripts/*' --fail-under=0
          python3 -m coverage report --include='workflow/lib/*' --fail-under=0
          python3 -m coverage report --include='containers/*' --fail-under=0

      - name: Report coverage wall time
        if: always()
        run: |
          elapsed=$(( $(date +%s) - JOB_STARTED ))
          echo "### coverage timing" >> "$GITHUB_STEP_SUMMARY"
          echo "- Wall time: ${elapsed}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- Soft budget: 60s (informational)" >> "$GITHUB_STEP_SUMMARY"

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Record job start
        run: echo "JOB_STARTED=$(date +%s)" >> "$GITHUB_ENV"

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Confirm exact checkout
        env:
          EXPECTED_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          actual_sha=$(git rev-parse HEAD)
          test "$actual_sha" = "$EXPECTED_SHA"
          pr_head_sha=${PR_HEAD_SHA:-n/a}
          pr_base_sha=${PR_BASE_SHA:-n/a}
          echo "event=$EVENT_NAME tier=frontend tested-sha=$actual_sha pr-head-sha=$pr_head_sha pr-base-sha=$pr_base_sha"
          echo "### CI identity" >> "$GITHUB_STEP_SUMMARY"
          echo "- Event: \`$EVENT_NAME\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tier: \`frontend\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tested SHA: \`$actual_sha\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- PR head SHA: \`$pr_head_sha\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- PR base SHA: \`$pr_base_sha\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Verify generated client is up to date
        working-directory: frontend
        run: |
          npm run openapi:generate
          git diff --exit-code -- openapi.json src/api/generated/
          test -z "$(git ls-files --others --exclude-standard -- src/api/generated/)"

      - name: Test
        working-directory: frontend
        run: npm test -- --run

      - name: Type check
        working-directory: frontend
        run: npm run typecheck

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Report frontend wall time
        if: always()
        run: |
          elapsed=$(( $(date +%s) - JOB_STARTED ))
          echo "### frontend timing" >> "$GITHUB_STEP_SUMMARY"
          echo "- Wall time: ${elapsed}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- Soft budget: 120s (informational)" >> "$GITHUB_STEP_SUMMARY"

  browser-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      redis:
        image: redis:7.4.9-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - name: Record job start
        run: echo "JOB_STARTED=$(date +%s)" >> "$GITHUB_ENV"

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Confirm exact checkout
        env:
          EXPECTED_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          actual_sha=$(git rev-parse HEAD)
          test "$actual_sha" = "$EXPECTED_SHA"
          pr_head_sha=${PR_HEAD_SHA:-n/a}
          pr_base_sha=${PR_BASE_SHA:-n/a}
          echo "event=$EVENT_NAME tier=browser-e2e tested-sha=$actual_sha pr-head-sha=$pr_head_sha pr-base-sha=$pr_base_sha"
          echo "### CI identity" >> "$GITHUB_STEP_SUMMARY"
          echo "- Event: \`$EVENT_NAME\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tier: \`browser-e2e\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tested SHA: \`$actual_sha\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- PR head SHA: \`$pr_head_sha\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- PR base SHA: \`$pr_base_sha\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Setup micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: workflow/envs/ci-fast.lock
          environment-name: ci-fast
          cache-environment: true
          cache-environment-key: browser-e2e-${{ runner.os }}-${{ hashFiles('workflow/envs/ci-fast.lock') }}

      - name: Install platform package
        shell: micromamba-shell {0}
        run: |
          python3 -m pip install --no-index --no-deps --no-build-isolation -e ".[api]"
          python3 -m pip check

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Real browser durable execution gate
        shell: micromamba-shell {0}
        working-directory: frontend
        env:
          ENCODE_PIPELINE_E2E_REDIS_URL: redis://127.0.0.1:6379/14
        run: npm run test:e2e

      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            frontend/playwright-report/
            frontend/test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Report browser wall time
        if: always()
        run: |
          elapsed=$(( $(date +%s) - JOB_STARTED ))
          echo "### browser-e2e timing" >> "$GITHUB_STEP_SUMMARY"
          echo "- Wall time: ${elapsed}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- Soft budget: 240s (informational)" >> "$GITHUB_STEP_SUMMARY"

  platform-real-execution:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      github.event_name == 'release'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    services:
      redis:
        image: redis:7.4.9-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - name: Record job start
        run: echo "JOB_STARTED=$(date +%s)" >> "$GITHUB_ENV"

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Confirm exact checkout
        env:
          EXPECTED_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          actual_sha=$(git rev-parse HEAD)
          test "$actual_sha" = "$EXPECTED_SHA"
          pr_head_sha=${PR_HEAD_SHA:-n/a}
          pr_base_sha=${PR_BASE_SHA:-n/a}
          echo "event=$EVENT_NAME tier=platform-real tested-sha=$actual_sha pr-head-sha=$pr_head_sha pr-base-sha=$pr_base_sha"
          echo "### CI identity" >> "$GITHUB_STEP_SUMMARY"
          echo "- Event: \`$EVENT_NAME\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tier: \`platform-real\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tested SHA: \`$actual_sha\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- PR head SHA: \`$pr_head_sha\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- PR base SHA: \`$pr_base_sha\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Setup micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: workflow/envs/ci-fast.lock
          environment-name: ci-fast
          cache-environment: true
          cache-environment-key: platform-real-${{ runner.os }}-${{ hashFiles('workflow/envs/ci-fast.lock') }}

      - name: Install platform package
        shell: micromamba-shell {0}
        run: |
          python3 -m pip install --no-index --no-deps --no-build-isolation -e ".[api]"
          python3 -m pip check

      - name: Run Redis, timeout, cancellation, and tiny execution gate
        shell: micromamba-shell {0}
        env:
          ENCODE_PIPELINE_TEST_REDIS_URL: redis://127.0.0.1:6379/15
        run: >-
          python3 -m pytest -m platform_real_execution test/workers -ra
          -p no:cacheprovider --durations=25 --durations-min=1.0
          --junitxml=platform-real-report.xml

      - name: Require passing, zero-skip platform outcomes
        if: always()
        shell: micromamba-shell {0}
        run: >-
          python3 scripts/check_junit_outcomes.py platform-real-report.xml
          --label "platform real-execution tier"

      - name: Upload platform real-execution evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: platform-real-junit-${{ github.run_id }}
          path: platform-real-report.xml
          if-no-files-found: error
          overwrite: true
          retention-days: 14

      - name: Report platform real wall time
        if: always()
        run: |
          elapsed=$(( $(date +%s) - JOB_STARTED ))
          echo "### platform real-execution timing" >> "$GITHUB_STEP_SUMMARY"
          echo "- Wall time: ${elapsed}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- Soft budget: 360s (informational)" >> "$GITHUB_STEP_SUMMARY"

  real-execution:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      github.event_name == 'release'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Record job start
        run: echo "JOB_STARTED=$(date +%s)" >> "$GITHUB_ENV"

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Confirm exact checkout
        env:
          EXPECTED_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          actual_sha=$(git rev-parse HEAD)
          test "$actual_sha" = "$EXPECTED_SHA"
          pr_head_sha=${PR_HEAD_SHA:-n/a}
          pr_base_sha=${PR_BASE_SHA:-n/a}
          echo "event=$EVENT_NAME tier=scientific-real tested-sha=$actual_sha pr-head-sha=$pr_head_sha pr-base-sha=$pr_base_sha"
          echo "### CI identity" >> "$GITHUB_STEP_SUMMARY"
          echo "- Event: \`$EVENT_NAME\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tier: \`scientific-real\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tested SHA: \`$actual_sha\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- PR head SHA: \`$pr_head_sha\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- PR base SHA: \`$pr_base_sha\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Setup micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: workflow/envs/chipseq.lock
          environment-name: chipseq
          cache-environment: true
          cache-environment-key: chipseq-${{ runner.os }}-${{ hashFiles('workflow/envs/chipseq.lock') }}

      - name: Scientific real-execution suite
        shell: micromamba-shell {0}
        env:
          HELIXWEAVE_REQUIRE_REAL_EXECUTION: "1"
        run: >-
          python3 -m pytest -m real_execution test/real_execution -ra
          -p no:cacheprovider --durations=25 --durations-min=1.0
          --junitxml=scientific-real-report.xml

      - name: Require passing, zero-skip scientific outcomes
        if: always()
        shell: micromamba-shell {0}
        run: >-
          python3 scripts/check_junit_outcomes.py scientific-real-report.xml
          --label "scientific real-execution tier"

      - name: Upload scientific real-execution evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scientific-real-junit-${{ github.run_id }}
          path: scientific-real-report.xml
          if-no-files-found: error
          overwrite: true
          retention-days: 14

      - name: Report scientific real wall time
        if: always()
        run: |
          elapsed=$(( $(date +%s) - JOB_STARTED ))
          echo "### scientific real-execution timing" >> "$GITHUB_STEP_SUMMARY"
          echo "- Wall time: ${elapsed}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- Soft budget: 1200s (informational)" >> "$GITHUB_STEP_SUMMARY"

  bulk-rnaseq-real-execution:
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.bulk_rnaseq_real_execution
    runs-on: [self-hosted, linux, x64, helixweave-bulk-rnaseq]
    timeout-minutes: 240
    environment: bulk-rnaseq-real-execution
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Record job start
        run: echo "JOB_STARTED=$(date +%s)" >> "$GITHUB_ENV"

      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}
          persist-credentials: false
          token: local-mirror-only

      - name: Confirm exact checkout and clean source tree
        env:
          EXPECTED_SHA: ${{ github.sha }}
          EXPECTED_REVIEWED_SHA: ${{ inputs.bulk_rnaseq_expected_sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          actual_sha=$(git rev-parse HEAD)
          test "$actual_sha" = "$EXPECTED_SHA"
          [[ "$EXPECTED_REVIEWED_SHA" =~ ^[0-9a-f]{40}$ ]]
          test "$actual_sha" = "$EXPECTED_REVIEWED_SHA"
          test -z "$(git status --porcelain=v1 --untracked-files=all)"
          pr_head_sha=${PR_HEAD_SHA:-n/a}
          pr_base_sha=${PR_BASE_SHA:-n/a}
          echo "event=workflow_dispatch tier=bulk-rnaseq-real tested-sha=$actual_sha pr-head-sha=$pr_head_sha pr-base-sha=$pr_base_sha"
          echo "### CI identity" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tested SHA: \`$actual_sha\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- PR head SHA: \`$pr_head_sha\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- PR base SHA: \`$pr_base_sha\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Require pre-admitted protected toolchain
        env:
          EXPECTED_MICROMAMBA_VERSION: "2.8.1"
          EXPECTED_MICROMAMBA_SHA256: 9689782d863c05a1bf5d2d371ba527104e7a4eb4310c1637d8653b751aed9c82
        run: |
          micromamba_path=$(command -v micromamba)
          test -f "$micromamba_path"
          test ! -L "$micromamba_path"
          test "$(micromamba --version)" = "$EXPECTED_MICROMAMBA_VERSION"
          actual_sha256=$(sha256sum "$micromamba_path" | awk '{print $1}')
          test "$actual_sha256" = "$EXPECTED_MICROMAMBA_SHA256"

      - name: Setup micromamba
        uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476 # v3
        with:
          environment-file: workflow/envs/ci-fast.lock
          environment-name: ci-fast
          download-micromamba: false
          cache-downloads: false
          cache-environment: false
          create-args: --offline

      - name: Install platform package
        shell: micromamba-shell {0}
        run: |
          python3 -m pip install --no-index --no-deps --no-build-isolation -e ".[api]"
          python3 -m pip check

      - name: Require runner-owned runtime coordinates
        shell: micromamba-shell {0}
        env:
          HELIXWEAVE_BULK_RNASEQ_RUNTIME_ROOT: ${{ vars.HELIXWEAVE_BULK_RNASEQ_RUNTIME_ROOT }}
          HELIXWEAVE_BULK_RNASEQ_FIXTURE_MANIFEST: ${{ vars.HELIXWEAVE_BULK_RNASEQ_FIXTURE_MANIFEST }}
          ENCODE_PIPELINE_TEST_REDIS_URL: ${{ vars.ENCODE_PIPELINE_TEST_REDIS_URL }}
          ENCODE_PIPELINE_MANAGED_DOCKER_EXECUTABLE: ${{ vars.ENCODE_PIPELINE_MANAGED_DOCKER_EXECUTABLE }}
          ENCODE_PIPELINE_MANAGED_DOCKER_SOCKET: ${{ vars.ENCODE_PIPELINE_MANAGED_DOCKER_SOCKET }}
        run: |
          required=(
            HELIXWEAVE_BULK_RNASEQ_RUNTIME_ROOT
            HELIXWEAVE_BULK_RNASEQ_FIXTURE_MANIFEST
            ENCODE_PIPELINE_TEST_REDIS_URL
            ENCODE_PIPELINE_MANAGED_DOCKER_EXECUTABLE
            ENCODE_PIPELINE_MANAGED_DOCKER_SOCKET
          )
          for name in "${required[@]}"; do
            test -n "${!name:-}" || {
              echo "::error::$name must be configured by the protected environment"
              exit 1
            }
          done
          test -d "$HELIXWEAVE_BULK_RNASEQ_RUNTIME_ROOT"
          test -f "$HELIXWEAVE_BULK_RNASEQ_FIXTURE_MANIFEST"
          test -x /usr/bin/unshare
          test -x "$ENCODE_PIPELINE_MANAGED_DOCKER_EXECUTABLE"
          test -S "$ENCODE_PIPELINE_MANAGED_DOCKER_SOCKET"

      - name: Verify pinned runtime admission without mutation or network
        shell: micromamba-shell {0}
        env:
          HELIXWEAVE_BULK_RNASEQ_RUNTIME_ROOT: ${{ vars.HELIXWEAVE_BULK_RNASEQ_RUNTIME_ROOT }}
          ENCODE_PIPELINE_MANAGED_DOCKER_EXECUTABLE: ${{ vars.ENCODE_PIPELINE_MANAGED_DOCKER_EXECUTABLE }}
          ENCODE_PIPELINE_MANAGED_DOCKER_SOCKET: ${{ vars.ENCODE_PIPELINE_MANAGED_DOCKER_SOCKET }}
        run: >-
          python3 scripts/stage_bulk_rnaseq_runtime_assets.py
          --asset-root "$HELIXWEAVE_BULK_RNASEQ_RUNTIME_ROOT"
          --docker-executable "$ENCODE_PIPELINE_MANAGED_DOCKER_EXECUTABLE"
          --docker-socket "$ENCODE_PIPELINE_MANAGED_DOCKER_SOCKET"
          --phase verify

      - name: Run rapid, STAR Salmon, and lifecycle acceptance
        shell: micromamba-shell {0}
        env:
          HELIXWEAVE_REQUIRE_BULK_RNASEQ_REAL_EXECUTION: "1"
          HELIXWEAVE_BULK_RNASEQ_RUNTIME_ROOT: ${{ vars.HELIXWEAVE_BULK_RNASEQ_RUNTIME_ROOT }}
          HELIXWEAVE_BULK_RNASEQ_FIXTURE_MANIFEST: ${{ vars.HELIXWEAVE_BULK_RNASEQ_FIXTURE_MANIFEST }}
          ENCODE_PIPELINE_TEST_REDIS_URL: ${{ vars.ENCODE_PIPELINE_TEST_REDIS_URL }}
          ENCODE_PIPELINE_MANAGED_DOCKER_EXECUTABLE: ${{ vars.ENCODE_PIPELINE_MANAGED_DOCKER_EXECUTABLE }}
          ENCODE_PIPELINE_MANAGED_DOCKER_SOCKET: ${{ vars.ENCODE_PIPELINE_MANAGED_DOCKER_SOCKET }}
        run: >-
          python3 -m pytest -m bulk_rnaseq_real_execution
          test/bulk_rnaseq_real_execution -ra -p no:cacheprovider
          --durations=25 --durations-min=1.0
          --basetemp="$RUNNER_TEMP/helixweave-bulk-rnaseq-real-${{ github.run_id }}"
          --junitxml="$RUNNER_TEMP/bulk-rnaseq-real-report.xml"

      - name: Require passing, zero-skip bulk RNA-seq outcomes
        if: always()
        shell: micromamba-shell {0}
        run: >-
          python3 scripts/check_junit_outcomes.py
          "$RUNNER_TEMP/bulk-rnaseq-real-report.xml"
          --label "bulk RNA-seq real-execution tier"

      - name: Require pre-admitted Node.js toolchain
        env:
          EXPECTED_NODE_VERSION: v22.23.1
          EXPECTED_NPM_VERSION: 10.9.8
        run: |
          node_root="$RUNNER_TOOL_CACHE/node/22.23.1/x64"
          test -x "$node_root/bin/node"
          test -x "$node_root/bin/npm"
          test -f "$RUNNER_TOOL_CACHE/node/22.23.1/x64.complete"
          test "$("$node_root/bin/node" --version)" = "$EXPECTED_NODE_VERSION"
          test "$("$node_root/bin/npm" --version)" = "$EXPECTED_NPM_VERSION"

      - name: Setup Node.js for the protected product Gate
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22.23.1'
          check-latest: false

      - name: Install protected product Gate dependencies
        working-directory: frontend
        env:
          DO_NOT_TRACK: "1"
          NPM_CONFIG_AUDIT: "false"
          NPM_CONFIG_CACHE: ${{ runner.tool_cache }}/helixweave-npm-cache
          NPM_CONFIG_FUND: "false"
          NPM_CONFIG_OFFLINE: "true"
          PLAYWRIGHT_BROWSERS_PATH: ${{ runner.tool_cache }}/helixweave-playwright/1.61.1
          SCARF_ANALYTICS: "false"
          SCARF_NO_ANALYTICS: "true"
        run: |
          unshare --user --map-root-user --net -- \
            bash -euo pipefail -c '
              npm ci --offline --no-audit --no-fund
              ./node_modules/.bin/playwright install-deps chromium --dry-run
              ./node_modules/.bin/playwright install chromium
              node -e "const fs = require(\"node:fs\"); const { chromium } = require(\"playwright\"); fs.accessSync(chromium.executablePath(), fs.constants.X_OK);"
            '

      - name: Run public registry-to-results Bulk RNA-seq product Gate
        shell: micromamba-shell {0}
        working-directory: frontend
        env:
          HELIXWEAVE_REQUIRE_BULK_RNASEQ_PRODUCT_GATE: "1"
          HELIXWEAVE_REQUIRE_BULK_RNASEQ_REAL_EXECUTION: "1"
          HELIXWEAVE_BULK_RNASEQ_RUNTIME_ROOT: ${{ vars.HELIXWEAVE_BULK_RNASEQ_RUNTIME_ROOT }}
          HELIXWEAVE_BULK_RNASEQ_FIXTURE_MANIFEST: ${{ vars.HELIXWEAVE_BULK_RNASEQ_FIXTURE_MANIFEST }}
          ENCODE_PIPELINE_TEST_REDIS_URL: ${{ vars.ENCODE_PIPELINE_TEST_REDIS_URL }}
          ENCODE_PIPELINE_MANAGED_DOCKER_EXECUTABLE: ${{ vars.ENCODE_PIPELINE_MANAGED_DOCKER_EXECUTABLE }}
          ENCODE_PIPELINE_MANAGED_DOCKER_SOCKET: ${{ vars.ENCODE_PIPELINE_MANAGED_DOCKER_SOCKET }}
          ENCODE_PIPELINE_E2E_REDIS_URL: ${{ vars.ENCODE_PIPELINE_TEST_REDIS_URL }}
          ENCODE_PIPELINE_JOB_TIMEOUT_SECONDS: "7200"
          ENCODE_PIPELINE_E2E_SCREENSHOT_DIR: ${{ runner.temp }}/helixweave-bulk-rnaseq-real-${{ github.run_id }}/product/evidence/screenshots
          HELIXWEAVE_BULK_RNASEQ_PRODUCT_EVIDENCE_DIR: ${{ runner.temp }}/helixweave-bulk-rnaseq-real-${{ github.run_id }}/product/evidence
          PLAYWRIGHT_BROWSERS_PATH: ${{ runner.tool_cache }}/helixweave-playwright/1.61.1
        run: npm run test:e2e -- bulk-rnaseq-unavailable.spec.ts

      - name: Require path-free product evidence and no managed containers
        if: always()
        shell: micromamba-shell {0}
        env:
          PRODUCT_EVIDENCE: ${{ runner.temp }}/helixweave-bulk-rnaseq-real-${{ github.run_id }}/product/evidence/bulk-rnaseq-product-evidence.json
          ENCODE_PIPELINE_MANAGED_DOCKER_EXECUTABLE: ${{ vars.ENCODE_PIPELINE_MANAGED_DOCKER_EXECUTABLE }}
          ENCODE_PIPELINE_MANAGED_DOCKER_SOCKET: ${{ vars.ENCODE_PIPELINE_MANAGED_DOCKER_SOCKET }}
        run: |
          test -s "$PRODUCT_EVIDENCE"
          python3 -m json.tool "$PRODUCT_EVIDENCE" >/dev/null
          container_ids=$(
            "$ENCODE_PIPELINE_MANAGED_DOCKER_EXECUTABLE" \
              --host "unix://$ENCODE_PIPELINE_MANAGED_DOCKER_SOCKET" \
              ps -aq
          )
          test -z "$container_ids"

      - name: Upload path-free bulk RNA-seq evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: bulk-rnaseq-real-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/bulk-rnaseq-real-report.xml
            ${{ runner.temp }}/helixweave-bulk-rnaseq-real-${{ github.run_id }}/**/evidence/**
          if-no-files-found: error
          overwrite: true
          retention-days: 14

      - name: Report bulk RNA-seq real wall time
        if: always()
        run: |
          elapsed=$(( $(date +%s) - JOB_STARTED ))
          echo "### bulk RNA-seq real-execution timing" >> "$GITHUB_STEP_SUMMARY"
          echo "- Wall time: ${elapsed}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- Hard timeout: 14400s" >> "$GITHUB_STEP_SUMMARY"

  container-smoke:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      github.event_name == 'release'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Record job start
        run: echo "JOB_STARTED=$(date +%s)" >> "$GITHUB_ENV"

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Confirm exact checkout
        env:
          EXPECTED_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          actual_sha=$(git rev-parse HEAD)
          test "$actual_sha" = "$EXPECTED_SHA"
          pr_head_sha=${PR_HEAD_SHA:-n/a}
          pr_base_sha=${PR_BASE_SHA:-n/a}
          echo "event=$EVENT_NAME tier=container-smoke tested-sha=$actual_sha pr-head-sha=$pr_head_sha pr-base-sha=$pr_base_sha"
          echo "### CI identity" >> "$GITHUB_STEP_SUMMARY"
          echo "- Event: \`$EVENT_NAME\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tier: \`container-smoke\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tested SHA: \`$actual_sha\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- PR head SHA: \`$pr_head_sha\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- PR base SHA: \`$pr_base_sha\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Build runner image
        run: docker build -f containers/Dockerfile.runner -t helixweave-runner:ci .

      - name: Smoke-test runner image
        run: bash scripts/smoke_container_runner.sh docker helixweave-runner:ci

      - name: Report container wall time
        if: always()
        run: |
          elapsed=$(( $(date +%s) - JOB_STARTED ))
          echo "### container-smoke timing" >> "$GITHUB_STEP_SUMMARY"
          echo "- Wall time: ${elapsed}s" >> "$GITHUB_STEP_SUMMARY"
          echo "- Soft budget: 1200s (informational)" >> "$GITHUB_STEP_SUMMARY"
